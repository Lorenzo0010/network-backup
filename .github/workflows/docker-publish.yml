name: Build and Push Docker Image
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Permette l'esecuzione manuale dalla scheda Actions di GitHub

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configurazione Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login su Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Estrazione dei metadati per Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/network-watchdog
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build e Push dell'immagine Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Ottimizzazione della cache per build successivi più veloci
          cache-from: type=gha
          cache-to: type=gha,mode=max
